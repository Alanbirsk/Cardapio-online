<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarius Burguer - Cozinha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--v:#22c55e;--vd:#16a34a;--bg:#0a0a0f;--cb:rgba(255,255,255,.03);--bb:rgba(255,255,255,.08);--tm:#a1a1aa;--w:#f59e0b;--d:#ef4444;--i:#3b82f6}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{background:var(--bg);color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .kh{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);padding:14px 22px;border-bottom:2px solid rgba(34,197,94,.2);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;flex-wrap:wrap;gap:10px}
        .khl{display:flex;align-items:center;gap:14px;flex-wrap:wrap}.kht{font-size:20px;font-weight:900}
        .kc{background:rgba(255,255,255,.05);padding:8px 16px;border-radius:10px;font-size:18px;font-weight:700;font-family:'Courier New',monospace;border:1px solid var(--bb)}
        .khr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .cs{display:flex;align-items:center;gap:5px;font-size:10px;padding:5px 10px;border-radius:15px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3)}
        .cs.offline{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#ef4444}
        .cd{width:7px;height:7px;border-radius:50%;background:var(--v);animation:pulse 2s infinite}
        .cs.offline .cd{background:#ef4444;animation:none}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
        .poll-counter{display:flex;align-items:center;gap:6px;font-size:10px;padding:4px 10px;border-radius:10px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--v)}
        .poll-dot{width:5px;height:5px;border-radius:50%;background:var(--v);animation:pulse 1s infinite}.poll-number{font-weight:900;font-size:13px}
        .alert{display:none;align-items:center;gap:6px;background:var(--d);color:#fff;padding:8px 16px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer}
        .alert.show{display:flex;animation:ap 1s infinite}
        @keyframes ap{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .btn{padding:8px 16px;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-2px)}
        .btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
        .btn-sound{background:rgba(255,255,255,.05);color:#fff;border:1px solid var(--bb)}
        .btn-online{background:rgba(34,197,94,.2);color:#22c55e;border:1px solid rgba(34,197,94,.4);font-size:13px;padding:10px 20px}
        .btn-offline{background:rgba(239,68,68,.2);color:#ef4444;border:1px solid rgba(239,68,68,.4);font-size:13px;padding:10px 20px}
        .kc2{display:flex;flex:1;overflow:hidden}@media(max-width:768px){.kc2{flex-direction:column}}
        .ks{width:380px;min-width:380px;background:#0c0c14;border-right:1px solid var(--bb);display:flex;flex-direction:column}
        @media(max-width:768px){.ks{width:100%;min-width:100%;max-height:40%}}
        .sr{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--bb)}
        .si{padding:14px 8px;text-align:center;cursor:pointer;transition:.2s;border-bottom:2px solid transparent;position:relative}
        .si:hover{background:rgba(34,197,94,.05)}.si.active{background:rgba(34,197,94,.1);border-bottom-color:var(--v)}
        .sv{font-size:26px;font-weight:900}.sv.pending{color:#f59e0b}.sv.preparing{color:#3b82f6}.sv.ready{color:#22c55e}
        .sl{font-size:9px;color:var(--tm);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
        .si .badge-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;display:none}
        .si .badge-dot.show{display:block}.si .badge-dot.pending{background:#f59e0b;animation:pulse 1.5s infinite}
        .ol{flex:1;overflow-y:auto;padding:8px}
        .oc{background:var(--cb);border:1px solid var(--bb);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:.2s}
        .oc:hover{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05);transform:translateX(4px)}
        .oc.selected{border-color:var(--v);background:rgba(34,197,94,.1)}
        .oc.new{border-color:#f59e0b;animation:ng 1.5s infinite}
        @keyframes ng{0%,100%{box-shadow:0 0 5px rgba(245,158,11,.2)}50%{box-shadow:0 0 18px rgba(245,158,11,.5)}}
        .oh{display:flex;justify-content:space-between;margin-bottom:6px}.on{font-weight:900;font-size:15px}.ot{font-size:10px;color:var(--tm)}
        .ocl{font-weight:600;font-size:13px;margin-bottom:4px}.oi{display:flex;justify-content:space-between;font-size:10px;color:var(--tm)}.oto{color:#4ade80;font-weight:700}
        .kd{flex:1;background:#0e0e14;overflow-y:auto;padding:24px}
        .es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--tm)}.ei{font-size:60px;margin-bottom:16px;opacity:.5}
        .dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bb)}.don{font-size:24px;font-weight:900}
        .ds{padding:8px 16px;border-radius:20px;font-weight:700;font-size:13px}
        .ds.pending{background:rgba(245,158,11,.2);color:#f59e0b}.ds.confirmed{background:rgba(139,92,246,.2);color:#8b5cf6}.ds.preparing{background:rgba(59,130,246,.2);color:#3b82f6}.ds.ready{background:rgba(34,197,94,.2);color:#22c55e}
        .tl{margin:20px 0}
        .ts{display:flex;gap:14px;padding:10px 0;position:relative;opacity:.3;transition:.3s}.ts.completed,.ts.active{opacity:1}
        .ti{width:38px;height:38px;min-width:38px;border-radius:50%;background:#1c1c1f;border:2px solid #27272a;display:flex;align-items:center;justify-content:center;font-size:17px;z-index:1}
        .ts.completed .ti{background:rgba(34,197,94,.15);border-color:var(--v)}.ts.active .ti{background:rgba(245,158,11,.2);border-color:#f59e0b;animation:ip 1.5s infinite}
        @keyframes ip{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.3)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
        .tc{flex:1;padding-top:3px}.tla{font-weight:700;font-size:14px}.ts.completed .tla{color:var(--v)}.ts.active .tla{color:#f59e0b}
        .tt{font-size:10px;color:var(--tm)}.tel{font-size:10px;color:var(--i);margin-top:2px}
        .tco{position:absolute;left:18px;top:48px;width:2px;height:calc(100% - 38px);background:#27272a}.ts.completed .tco{background:var(--v)}
        .dg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
        .dc{background:rgba(255,255,255,.02);border:1px solid var(--bb);padding:12px;border-radius:10px}
        .dcl{font-size:9px;color:var(--tm);text-transform:uppercase;letter-spacing:1px}.dcv{font-weight:700;font-size:13px;margin-top:3px}
        .il{margin:16px 0}.il h4{font-size:13px;margin-bottom:10px}
        .ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
        .ina{font-weight:600;font-size:13px}.ino{font-size:10px;color:#f59e0b;margin-top:2px;font-style:italic}.ipr{color:#4ade80;font-weight:700;font-size:13px}
        .addons-kitchen{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
        .addons-kitchen-title{font-size:11px;color:var(--v);font-weight:700;margin-bottom:6px}
        .addons-kitchen-item{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}.addons-kitchen-item span{color:#4ade80}
        .tse{margin-top:auto;padding-top:16px;border-top:1px solid var(--bb)}
        .tro{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;color:var(--tm)}
        .trf{display:flex;justify-content:space-between;font-size:20px;font-weight:900;color:#4ade80;margin-top:8px}
        .ac{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
        .ab{flex:1;min-width:100px;padding:14px;border:none;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
        .ab:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
        .ab-confirm{background:#8b5cf6;color:#fff}.ab-prepare{background:#3b82f6;color:#fff}.ab-ready{background:#22c55e;color:#fff}.ab-finish{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}.ab-wa{background:#25D366;color:#fff}.ab-cancel{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
        .toast{position:fixed;bottom:20px;right:20px;background:var(--v);padding:12px 20px;border-radius:10px;font-weight:800;font-size:13px;z-index:9999;display:none;box-shadow:0 10px 30px rgba(0,0,0,.3)}
    </style>
</head>
<body>

<div class="kh">
    <div class="khl"><span style="font-size:28px;">👨‍🍳</span><span class="kht">Painel da Cozinha</span><div class="cs" id="connectionStatus"><span class="cd"></span><span id="statusText">Online</span></div></div>
    <div class="khr">
        <div class="poll-counter"><span class="poll-dot"></span>Consultas: <span class="poll-number" id="pollCount">0</span></div>
        <div class="alert" id="alertBadge" onclick="focusNew()">🔔 <span id="newCount">0</span> novo(s)!</div>
        <div class="kc" id="clock">00:00:00</div>
        <button class="btn btn-online" id="btnOnline" onclick="setOnline(true)" style="display:none;">🟢 Ficar Online</button>
        <button class="btn btn-offline" id="btnOffline" onclick="setOnline(false)">🔴 Ficar Offline</button>
        <button class="btn btn-sound" onclick="toggleSound()" id="sndBtn">🔊</button>
        <button class="btn btn-danger" onclick="logout()">🚪 Sair</button>
    </div>
</div>

<div class="kc2">
    <div class="ks">
        <div class="sr">
            <div class="si active" id="tabP" onclick="filter('pendente')"><div class="badge-dot pending" id="pendingDot"></div><div class="sv pending" id="statP">0</div><div class="sl">Novos</div></div>
            <div class="si" id="tabPr" onclick="filter('preparando')"><div class="sv preparing" id="statPr">0</div><div class="sl">Preparando</div></div>
            <div class="si" id="tabR" onclick="filter('pronto')"><div class="sv ready" id="statR">0</div><div class="sl">Prontos</div></div>
        </div>
        <div class="ol" id="ordersList"></div>
    </div>
    <div class="kd" id="detail"><div class="es"><div class="ei">📋</div><p>Selecione um pedido para ver os detalhes</p></div></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc as fsDoc, updateDoc, setDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    const fc={apiKey:"AIzaSyABe9h5dM1FHrsYOI9vPiEvHsozqb-9PYI",authDomain:"aquarius-burguer.firebaseapp.com",projectId:"aquarius-burguer",storageBucket:"aquarius-burguer.firebasestorage.app",messagingSenderId:"1014795439621",appId:"1:1014795439621:web:1aef68c277c1e2f8aa966c"};
    const app=initializeApp(fc);const db=getFirestore(app);
    window.db=db;window.fsColl=collection;window.fsDoc=fsDoc;window.fsUpd=updateDoc;window.fsSet=setDoc;window.fsSnap=onSnapshot;window.fsQ=query;window.fsOB=orderBy;
    setTimeout(()=>{if(window.initKitchen)window.initKitchen()},300);
</script>

<script>
    const auth=localStorage.getItem('aquarius_kitchen_auth');
    if(!auth||(Date.now()-JSON.parse(auth).ts>86400000)){const p=prompt('Senha da cozinha:');if(p!=='cozinha123'){alert('Acesso negado!');window.close()}else{localStorage.setItem('aquarius_kitchen_auth',JSON.stringify({ts:Date.now()}))}}

    let orders=[],selId=null,fil='pendente',snd=true,newIds=new Set(),alertInt=null,isOnline=true,firebaseReady=false,unsubscribeOrders=null,pollCount=0;

    function updClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
    setInterval(updClock,1000);updClock();
    function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2000)}
    function updatePollCounter(){pollCount++;document.getElementById('pollCount').textContent=pollCount;}

    async function setOnline(online){isOnline=online;try{await window.fsSet(window.fsDoc(window.db,"status_cozinha","online"),{online,ultimaAtualizacao:new Date().toISOString()},{merge:true})}catch(e){await window.fsSet(window.fsDoc(window.db,"status_cozinha","online"),{online,ultimaAtualizacao:new Date().toISOString()})}updateOnlineUI();toast(online?'🟢 ONLINE!':'🔴 OFFLINE!')}
    function updateOnlineUI(){const cs=document.getElementById('connectionStatus'),st=document.getElementById('statusText'),btnOn=document.getElementById('btnOnline'),btnOff=document.getElementById('btnOffline');if(isOnline){cs.classList.remove('offline');st.textContent='Online';btnOn.style.display='none';btnOff.style.display='inline-block'}else{cs.classList.add('offline');st.textContent='Offline';btnOn.style.display='inline-block';btnOff.style.display='none'}}
    function toggleSound(){snd=!snd;document.getElementById('sndBtn').textContent=snd?'🔊':'🔇';if(!snd&&alertInt){clearInterval(alertInt);alertInt=null}}
    function playBeep(){try{const ac=new(window.AudioContext||window.webkitAudioContext)(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(880,ac.currentTime);o.frequency.setValueAtTime(660,ac.currentTime+.1);o.type='square';g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+.4);o.start(ac.currentTime);o.stop(ac.currentTime+.4)}catch(e){}}
    async function logout(){if(confirm('Deseja sair? A cozinha ficará OFFLINE.')){await setOnline(false);localStorage.removeItem('aquarius_kitchen_auth');window.close()}}

    function initKitchen(){
        if(!window.db){setTimeout(initKitchen,500);return}
        if(firebaseReady)return;
        firebaseReady=true;
        if(unsubscribeOrders)unsubscribeOrders();
        const oq=window.fsQ(window.fsColl(window.db,"pedidos_ativos"),window.fsOB("dataHora","desc"));
        unsubscribeOrders=window.fsSnap(oq,(snap)=>{updatePollCounter();const oi=new Set(orders.map(o=>o.id));orders=[];snap.forEach(d=>orders.push({id:d.id,...d.data()}));const nw=orders.filter(o=>!oi.has(o.id)&&o.status==='pendente');nw.forEach(o=>{newIds.add(o.id)});updAlert();renderOrders();if(selId&&!orders.find(o=>o.id===selId)){selId=null;renderDetail()}else if(selId)renderDetail()},(err)=>{firebaseReady=false;setTimeout(initKitchen,3000)});
        const statusRef=window.fsDoc(window.db,"status_cozinha","online");
        window.fsSnap(statusRef,(snap)=>{updatePollCounter();if(snap.exists()){isOnline=snap.data().online!==false;updateOnlineUI()}});
    }

    function updAlert(){for(let id of newIds){if(!orders.find(o=>o.id===id&&o.status==='pendente'))newIds.delete(id)}const b=document.getElementById('alertBadge'),c=document.getElementById('newCount'),dot=document.getElementById('pendingDot');c.textContent=newIds.size;if(dot)dot.classList.toggle('show',newIds.size>0);if(newIds.size>0&&isOnline){b.classList.add('show');if(snd&&!alertInt){playBeep();alertInt=setInterval(playBeep,3000)}}else{b.classList.remove('show');if(alertInt){clearInterval(alertInt);alertInt=null}}}
    function focusNew(){fil='pendente';updTabs();renderOrders()}
    function filter(s){fil=s;updTabs();renderOrders()}
    function updTabs(){['P','Pr','R'].forEach(s=>{const t=document.getElementById('tab'+s);if(t)t.classList.toggle('active',fil===(s==='P'?'pendente':s==='Pr'?'preparando':'pronto'))})}
    function renderOrders(){document.getElementById('statP').textContent=orders.filter(o=>o.status==='pendente').length;document.getElementById('statPr').textContent=orders.filter(o=>o.status==='preparando'||o.status==='confirmado').length;document.getElementById('statR').textContent=orders.filter(o=>o.status==='pronto').length;let fl;if(fil==='preparando')fl=orders.filter(o=>o.status==='preparando'||o.status==='confirmado');else fl=orders.filter(o=>o.status===fil);if(fil==='pendente')fl=fl.filter(o=>o.status!=='finalizado'&&o.status!=='cancelado');let h='';fl.forEach(o=>{const nw=newIds.has(o.id);h+=`<div class="oc${o.id===selId?' selected':''}${nw?' new':''}" onclick="select('${o.id}')"><div class="oh"><span class="on">#${o.numeroPedido||o.id.substring(0,6)}</span><span class="ot">${o.dataHora?new Date(o.dataHora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''}</span></div><div class="ocl">${o.cliente}</div><div class="oi"><span>${o.itens?o.itens.length:0} itens</span><span class="oto">R$ ${parseFloat(o.total||0).toFixed(2)}</span></div></div>`});document.getElementById('ordersList').innerHTML=h||'<div style="text-align:center;color:var(--tm);padding:30px;">Nenhum pedido</div>'}
    function select(id){selId=id;const o=orders.find(x=>x.id===id);if(o&&o.status==='pendente'){newIds.delete(id);updAlert()}renderOrders();renderDetail()}

    function renderDetail(){const o=orders.find(x=>x.id===selId);if(!o){document.getElementById('detail').innerHTML='<div class="es"><div class="ei">📋</div><p>Selecione um pedido</p></div>';return}
        const st={pendente:'⏳ Novo',confirmado:'✅ Confirmado',preparando:'👨‍🍳 Preparando',pronto:'🎯 Pronto',finalizado:'🎉 Finalizado'};
        const steps=[{icon:'📋',label:'Pedido Recebido',time:o.dataHora?new Date(o.dataHora).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'',completed:true,active:o.status==='pendente'},{icon:'✅',label:'Confirmado',time:o.horaConfirmacao?new Date(o.horaConfirmacao).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'',completed:['confirmado','preparando','pronto','finalizado'].includes(o.status),active:o.status==='confirmado'},{icon:'👨‍🍳',label:'Em Preparo',time:o.horaPreparo?new Date(o.horaPreparo).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'',completed:['preparando','pronto','finalizado'].includes(o.status),active:o.status==='preparando',elapsed:o.horaPreparo?Math.floor((Date.now()-new Date(o.horaPreparo))/60000)+'min':''},{icon:'🎯',label:'Pronto',time:o.horaPronto?new Date(o.horaPronto).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'',completed:['pronto','finalizado'].includes(o.status),active:o.status==='pronto',elapsed:o.horaPronto?Math.floor((Date.now()-new Date(o.horaPronto))/60000)+'min':''},{icon:'🎉',label:'Finalizado',time:o.status==='finalizado'?new Date(o.ultimaAtualizacao).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'',completed:o.status==='finalizado',active:o.status==='finalizado'}];
        const th=steps.map((s,i)=>`<div class="ts${s.completed?' completed':''}${s.active?' active':''}"><div class="ti">${s.icon}</div><div class="tc"><div class="tla">${s.label}</div>${s.time?`<div class="tt">${s.time}</div>`:''}${s.elapsed?`<div class="tel">⏱️ ${s.elapsed}</div>`:''}</div>${i<steps.length-1?'<div class="tco"></div>':''}</div>`).join('');
        const ih=o.itens?o.itens.map(it=>`<div class="ir"><div><div class="ina">${it.qtd}x ${it.nome}</div>${it.obs?`<div class="ino">Obs: ${it.obs}</div>`:''}</div><span class="ipr">R$ ${((it.precoUn||0)*(it.qtd||0)).toFixed(2)}</span></div>`).join(''):'';
        const addonsHtml=o.adicionais&&o.adicionais.length>0?`<div class="addons-kitchen"><div class="addons-kitchen-title">🍟 Adicionais:</div>${o.adicionais.map(a=>`<div class="addons-kitchen-item"><span>• ${a.nome}</span><span>+R$ ${parseFloat(a.preco).toFixed(2)}</span></div>`).join('')}</div>`:'';
        document.getElementById('detail').innerHTML=`<div class="dh"><div><div class="don">#${o.numeroPedido||o.id.substring(0,6)}</div><div style="font-size:10px;color:var(--tm);margin-top:3px;">⏱️ ${o.dataHora?Math.floor((Date.now()-new Date(o.dataHora))/60000)+'min':'?'}</div></div><span class="ds ${o.status}">${st[o.status]||o.status}</span></div><div class="tl">${th}</div><div class="dg"><div class="dc"><div class="dcl">Cliente</div><div class="dcv">${o.cliente}</div></div><div class="dc"><div class="dcl">Telefone</div><div class="dcv">${o.telefone||'N/A'}</div></div><div class="dc"><div class="dcl">Tipo</div><div class="dcv">${o.tipoEntrega==='entrega'?'🏍️ Delivery':'🏪 Retirada'}</div></div><div class="dc"><div class="dcl">Pagamento</div><div class="dcv">${o.formaPagamento||'N/A'}</div></div></div>${o.tipoEntrega==='entrega'?`<div class="dc" style="margin-bottom:10px;"><div class="dcl">Endereço</div><div class="dcv">${o.endereco||''}</div></div>`:''}${o.cupomCodigo?`<div style="background:rgba(34,197,94,.05);padding:8px 12px;border-radius:8px;margin-bottom:10px;font-size:11px;">🎫 Cupom: <strong>${o.cupomCodigo}</strong> - Desconto: R$ ${parseFloat(o.desconto||0).toFixed(2)}</div>`:''}<div class="il"><h4>📋 Itens do Pedido</h4>${ih}</div>${addonsHtml}<div class="tse"><div class="tro"><span>Subtotal</span><span>R$ ${parseFloat(o.subtotal||0).toFixed(2)}</span></div>${o.desconto>0?`<div class="tro"><span>Desconto</span><span style="color:#4ade80;">-R$ ${parseFloat(o.desconto).toFixed(2)}</span></div>`:''}${o.taxaEntrega>0?`<div class="tro"><span>Taxa</span><span>R$ ${parseFloat(o.taxaEntrega).toFixed(2)}</span></div>`:''}<div class="trf"><span>Total</span><span>R$ ${parseFloat(o.total||0).toFixed(2)}</span></div></div><div class="ac">${o.status==='pendente'?`<button class="ab ab-confirm" onclick="updStatus('${o.id}','confirmado')">✅ Confirmar</button>`:''}${o.status==='confirmado'?`<button class="ab ab-prepare" onclick="updStatus('${o.id}','preparando')">👨‍🍳 Iniciar Preparo</button>`:''}${o.status==='preparando'?`<button class="ab ab-ready" onclick="updStatus('${o.id}','pronto')">🎯 Marcar Pronto</button>`:''}${o.status==='pronto'?`<button class="ab ab-finish" onclick="updStatus('${o.id}','finalizado')">🎉 Finalizar</button>`:''}${o.telefone?`<button class="ab ab-wa" onclick="sendWA('${o.id}')">💬 WhatsApp</button>`:''}<button class="ab ab-cancel" onclick="cancelOrd('${o.id}')">❌ Cancelar</button></div>`}

    async function updStatus(oid,ns){try{const d={status:ns,ultimaAtualizacao:new Date().toISOString()};if(ns==='preparando')d.horaPreparo=new Date().toISOString();else if(ns==='pronto')d.horaPronto=new Date().toISOString();await window.fsUpd(window.fsDoc(window.db,"pedidos_ativos",oid),d);if(ns==='finalizado'){selId=null;renderDetail()}toast('✅ Status atualizado!')}catch(e){alert('Erro: '+e.message)}}
    function sendWA(oid){const o=orders.find(x=>x.id===oid);if(!o||!o.telefone)return;const sm={pendente:'⏳ Em processamento',confirmado:'✅ Confirmado!',preparando:'👨‍🍳 Em preparo',pronto:'🎯 Pronto! '+(o.tipoEntrega==='entrega'?'Saindo para entrega':'Retire no balcão'),finalizado:'🎉 Finalizado'};let m='🍔 *AQUARIUS BURGUER*\n\nOlá *'+o.cliente+'*! 👋\n\nPedido *#'+(o.numeroPedido||o.id.substring(0,6))+'*\n'+(sm[o.status]||'')+'\n\n📋 *Itens:*\n';if(o.itens)o.itens.forEach(i=>m+='• '+i.qtd+'x '+i.nome+'\n');if(o.adicionais&&o.adicionais.length>0){m+='\n🍟 *Adicionais:*\n';o.adicionais.forEach(a=>m+='• '+a.nome+' +R$ '+parseFloat(a.preco).toFixed(2)+'\n')}m+='\n💰 Total: R$ '+parseFloat(o.total||0).toFixed(2)+'\n💳 '+(o.formaPagamento||'');window.open('https://wa.me/55'+o.telefone.replace(/\D/g,'')+'?text='+encodeURIComponent(m))}
    async function cancelOrd(oid){if(!confirm('Cancelar este pedido?'))return;try{await window.fsUpd(window.fsDoc(window.db,"pedidos_ativos",oid),{status:'cancelado',ultimaAtualizacao:new Date().toISOString()});newIds.delete(oid);updAlert();if(selId===oid){selId=null;renderDetail()}toast('❌ Cancelado!')}catch(e){alert('Erro: '+e.message)}}

    window.initKitchen=initKitchen;updateOnlineUI();
    window.addEventListener('beforeunload',()=>{if(isOnline)setOnline(false)});
</script>
</body>
</html>
